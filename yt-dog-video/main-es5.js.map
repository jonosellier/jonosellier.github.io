<div class="app-root" (scroll)="onWindowScroll()">
    <div [routerLink]="['/']">
        <h1 [ngClass]="{'big':!searchConducted}">Watch Dogs</h1>
    </div>
    <input id="search" matInput placeholder="Search" type="text" [(ngModel)]="term" (keyup.enter)="searchRedirect()">
    <section *ngIf="searchConducted">
        <div class="video-holder">
            <div class="video-card" *ngFor="let res of results" [style.backgroundImage]="'url('+res.snippet.thumbnails.high.url+')'" [routerLink]="['/v/'+res.id.videoId]">
                <div class="vc-content">
                    <h2>{{res.snippet.title}}</h2>
                    <h3>{{res.snippet.description}}</h3>
                </div>
            </div>
        </div>
        <div class="loading">
            <h3>Loading more videos...</h3>
        </div>
    </section>
    <section *ngIf="showSuggestions">
        <h1>Suggested videos</h1>
        <div class="suggested-video-card" [routerLink]="['/v/'+suggestedVideos[suggestionIdx].id.videoId]">
            <div class="thumbnail" [style.backgroundImage]="'url('+suggestedVideos[suggestionIdx].snippet.thumbnails.high.url+')'"></div>
            <div class="vc-content">
                <h2>{{suggestedVideos[suggestionIdx].snippet.title}}</h2>
                <h3>{{suggestedVideos[suggestionIdx].snippet.description}}</h3>
            </div>
        </div>
    </section>
</div>
