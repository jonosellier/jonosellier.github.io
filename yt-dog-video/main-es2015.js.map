<div class="video-container">
    <input id="search" class="wide sm" matInput placeholder="Search for more dog videos" type="text" [(ngModel)]="term" (keyup.enter)="searchRedirect()">
    <iframe class="video-frame" [src]="getVideoUrl()" frameborder="0" allow="accelerometer; autoplay; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
    <h1>{{video.items[0].snippet.title}}</h1>
    <hr>
    <h2>{{video.items[0].snippet.channelTitle}}</h2>
    <h3>
        {{video.items[0].snippet.localized.description}}
    </h3>
</div>
